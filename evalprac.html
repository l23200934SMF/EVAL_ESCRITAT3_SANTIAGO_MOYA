<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-commerce con Carrito Benito Santos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <link rel="stylesheet" href="estilo.css">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                Benito Santos
            </a>
        </div>
    </nav>

    <header class="fondo text-white text-center p-5">
        <h1>Benito Santos</h1>
        <p>Moda mexicana con elegancia</p>
    </header>

    <section class="container mt-5">
        <h2 class="text-center">Productos</h2>

        <div class="row" id="productos"></div>

        <hr class="my-5">

        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4>Carrito de compras</h4>
            </div>

            <div class="card-body">
                <ul id="carrito" class="list-group mb-3"></ul>

                <h4>Total: $<span id="total">0.00</span></h4>

                <button class="btn btn-danger" onclick="vaciarCarrito()">
                    Vaciar carrito
                </button>
            </div>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

        <footer class="bg-dark text-white text-center p-4">

        <p>© 2026 - Tecnm campus Pachuca - Programacion web - Evaluación Práctica - Santiago Moya Ferrusca </p>

        <h3> Redes sociales </h3>
        <p>
            <a href="https://www.instagram.com/benitosantosoficial/" target="_blank">
                <img src="https://cliply.co/wp-content/uploads/2019/07/371907300_INSTAGRAM_ICON_400px.gif" width="50">
            </a>
            <a href="https://www.facebook.com/benitosantosmx" target="_blank">
                <img src="https://cliply.co/wp-content/uploads/2019/07/371907490_FACEBOOK_ICON_400px.gif" width="50">
            </a>
        </p>

    </footer>

</body>

</html>
